        summary: Architected AI and image processing automation for chip verification and design rule development.
        highlights:
          - Architected an SVRF Copilot (a domain specific coding language) to automate design rule decks development. Pipeline involved LLM, LangChain, and an MCP protocol with tool-aware reasoning. Published as first-author IEEE ICLAD 2025; reduced rule development time by ~40%.
          - Designed an AI and image processing tool that utilizes Scanning Electron Microscope (SEM) images to automate process modeling; reduced manual review by 30%.
