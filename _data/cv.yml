    Projects:
      - name: Domain Specific Language Copilot
        summary: Minimal viable product that automatically generates Standard Verification Rule Format (SVRF) language code from natural-language descriptions.
        start_date: 2024
        end_date: 2025
        highlights:
          - Integrated a chat interface using LangChain and connected the model to a language server for contextual suggestions.
          - Integrated the system with Model Context Protocol (MCP) for agentic custom function execution.
      - name: Agent Solutions for EDA & Pattern-less PDK Verification
        summary: AI agentic flow to automate EDA verification tasks, orchestrating design checks, simulation, and optimization.
        start_date: 2024
        end_date: 2025
        highlights:
          - Developed a pattern-less framework for verifying Process Design Kit (PDK) rules and multiple MCP functions.
          - Integrated agents into existing workflows enabling continuous validation of PDKs.
      - name: SEM Image Deep Learning Cleaning
        summary: Deep neural network system that automatically classifies physical SEM images by quality and structural feature type.
        start_date: 2024
        end_date: 2024
        highlights:
          - Created a cross-platform QT interface to visualize and review large datasets.
          - Automated generation of modeling files from cleaned data, reducing manual effort.
      - name: Big Data Quantum Mechanics
        summary: Vertically Integrated Project at Georgia Tech.
        start_date: 2023
        end_date: 2023
        highlights:
          - Conducted quantum mechanical simulations using Quantum Espresso.
          - Benchmarked the Equiformer_v2 graph GNN model.
      - name: Reinforcement Learning for Stock Trading
        summary: Research Project at Georgia Tech.
        start_date: 2022
        end_date: 2022
        highlights:
          - Architected a reinforcement learning system focusing on dynamic environment adaptation.
          - Designed custom reward functions and non-stationary exploration policies.
      - name: AI Kernel
        summary: AI-First OS featuring a polyglot microkernel with Rust core and Python orchestration.
        start_date: 2024
        end_date: 2025
        highlights:
          - Minimal, memory-safe kernel core handling hardware abstraction, IPC, and task scheduling.
          - High-level Python layer for managing AI workload pipelines, model loading, and GPU resource allocation.
          - Custom scheduler optimized for the bursty, GPU-heavy compute patterns of deep learning.
      - name: Tennis Match Winner Predictions
        summary: ML-driven winner prediction platform for professional men's tennis matches.
        start_date: 2022
        end_date: 2022
        highlights:
          - Engineered robust data processing pipeline scaling from 182k raw records to 16k cleaned data points.
          - Evaluated multiple models including decision trees, boosting, and neural networks; selected Gradient Boosting.
          - Developed an interactive web application using Dash and Plotly showing player head-to-head metrics.
      - name: Randomized Optimization & Clustering Benchmarks
        summary: Comparative analysis of randomized search heuristics and unsupervised grouping techniques on high-dimensional data.
        start_date: 2024
        end_date: 2024
        highlights:
          - Benchmarked RHC, Simulated Annealing, GA, and MIMIC on constraint satisfaction and neural net tuning.
          - Combined K-Means and Expectation Maximization clustering with PCA/ICA to generate features for classification.
          - Demonstrated significant training speedups and accuracy improvements using ICA-derived feature spaces.
