      - company: Siemens Digital Industries Software (EDA)
        position: IC Design Consultant
        location: Shanghai, China
        start_date: 2017
        end_date: 2022
        summary: Designed and automated optical proximity correction (OPC) model building and resolution enhancement techniques.
        highlights:
          - Developed an OPC model-building automation system covering test-pattern creation, data filtering/prep, SEM metrology recipe development, and OPC verification; accelerated calibration cycles and reduced manual steps by 90%.
          - Interfaced with physical metrology tools to auto-generate measurement; defined spatial pattern "uniqueness" via the mathematical entropy of extracted features.
          - Architected a web-based recipe/version management platform with role-based access, improving security, tractability, and collaboration across teams.
          - Implemented RET automation (pattern-coverage checks, DRM management) using C/C++ LAPI and ML-based feature extraction; increased coverage by 25% and cut setup time by 50%.
          - Built computational models and test masks for technology ramps, meeting strict physical accuracy targets for hardware nodes from 90nm KrF to 5nm ArF.

